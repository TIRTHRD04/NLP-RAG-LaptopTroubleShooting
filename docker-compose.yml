services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 2G

  api:
    build: .
    container_name: rag-api
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --workers 1 --log-level info
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  qdrant_storage:

networks:
  rag-network:
    driver: bridge